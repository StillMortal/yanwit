<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
    <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1da1f2;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#0d8de0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0a6ebd;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="chestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#c5e2fc;stop-opacity:0.7" />
        </linearGradient>
        
        <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0d6ebd;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#09508a;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="beakGrad" x1="0%" y1="0%" x2="100%" y2="50%">
            <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e69500;stop-opacity:1" />
        </linearGradient>
        
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
        </filter>
    </defs>
    
    <!-- Хвост -->
    <path d="M150,180 L190,260 L185,270 L150,200 L115,270 L110,260 Z" fill="url(#bodyGrad)" opacity="0.5"/>
    <path d="M150,180 L200,250 L195,260 L150,200 Z" fill="url(#bodyGrad)" opacity="0.4"/>
    <path d="M150,180 L100,250 L105,260 L150,200 Z" fill="url(#bodyGrad)" opacity="0.4"/>
    
    <!-- Тело -->
    <ellipse cx="150" cy="140" rx="55" ry="70" fill="url(#bodyGrad)" filter="url(#shadow)"/>
    
    <!-- Грудь -->
    <ellipse cx="150" cy="160" rx="35" ry="45" fill="url(#chestGrad)"/>
    
    <!-- Левое крыло -->
    <path d="M105,110 C75,120 60,145 65,165 C75,158 85,150 95,145 C88,138 85,128 105,110Z" fill="url(#wingGrad)"/>
    <path d="M70,155 C78,148 85,143 92,140" stroke="#09508a" stroke-width="1.5" fill="none"/>
    <path d="M65,148 C73,141 82,136 90,133" stroke="#09508a" stroke-width="1.5" fill="none"/>
    <path d="M68,162 C76,155 84,150 92,147" stroke="#09508a" stroke-width="1.5" fill="none"/>
    
    <!-- Правое крыло -->
    <path d="M195,110 C225,120 240,145 235,165 C225,158 215,150 205,145 C212,138 215,128 195,110Z" fill="url(#wingGrad)"/>
    <path d="M230,155 C222,148 215,143 208,140" stroke="#09508a" stroke-width="1.5" fill="none"/>
    <path d="M235,148 C227,141 218,136 210,133" stroke="#09508a" stroke-width="1.5" fill="none"/>
    <path d="M232,162 C224,155 216,150 208,147" stroke="#09508a" stroke-width="1.5" fill="none"/>
    
    <!-- Синие зеркальца на крыльях -->
    <path d="M82,138 C86,142 84,148 80,144 C76,140 78,135 82,138Z" fill="#4bb3f5" opacity="0.8"/>
    <path d="M218,138 C214,142 216,148 220,144 C224,140 222,135 218,138Z" fill="#4bb3f5" opacity="0.8"/>
    
    <!-- Белые пятна на крыльях -->
    <path d="M75,130 C80,134 78,140 72,136 C68,132 70,127 75,130Z" fill="#ffffff" opacity="0.6"/>
    <path d="M225,130 C220,134 222,140 228,136 C232,132 230,127 225,130Z" fill="#ffffff" opacity="0.6"/>
    
    <!-- Голова -->
    <circle cx="150" cy="85" r="45" fill="url(#bodyGrad)" filter="url(#shadow)"/>
    
    <!-- Белые брови -->
    <path d="M115,75 C125,70 135,70 142,75" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M158,75 C165,70 175,70 185,75" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Левый глаз -->
    <circle cx="132" cy="85" r="8" fill="#1a1a1a"/>
    <circle cx="130" cy="83" r="3" fill="#ffffff"/>
    <circle cx="134" cy="87" r="1.5" fill="#ffffff" opacity="0.5"/>
    
    <!-- Правый глаз -->
    <circle cx="168" cy="85" r="8" fill="#1a1a1a"/>
    <circle cx="166" cy="83" r="3" fill="#ffffff"/>
    <circle cx="170" cy="87" r="1.5" fill="#ffffff" opacity="0.5"/>
    
    <!-- Клюв (только клюв, без лишнего) -->
    <path d="M143,96 L150,107 L157,96 Z" fill="url(#beakGrad)"/>
    
    <!-- Лапки -->
    <path d="M130,210 L120,235 M130,210 L130,238 M130,210 L140,235" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M170,210 L160,235 M170,210 L170,238 M170,210 L180,235" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Коготки -->
    <path d="M118,237 L116,242" stroke="#e69500" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M130,240 L130,245" stroke="#e69500" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M142,237 L144,242" stroke="#e69500" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M158,237 L156,242" stroke="#e69500" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M170,240 L170,245" stroke="#e69500" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M182,237 L184,242" stroke="#e69500" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Перья на груди -->
    <path d="M135,155 Q140,150 145,155" stroke="#a8d5f5" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M140,165 Q145,160 150,165" stroke="#a8d5f5" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M150,155 Q155,150 160,155" stroke="#a8d5f5" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M155,165 Q160,160 165,165" stroke="#a8d5f5" stroke-width="1" fill="none" opacity="0.5"/>
    
    <!-- Блик на теле -->
    <ellipse cx="145" cy="120" rx="15" ry="8" fill="#ffffff" opacity="0.15" transform="rotate(-20,145,120)"/>
</svg>